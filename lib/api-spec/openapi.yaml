openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resume
    description: Resume upload and analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /resume/upload:
    post:
      operationId: uploadResume
      tags: [resume]
      summary: Upload a resume file
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /resume/analyze/{filename}:
    post:
      operationId: analyzeResume
      tags: [resume]
      summary: Analyze an uploaded resume
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PokemonCardData"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /resume/card-image:
    post:
      operationId: generateCardImage
      tags: [resume]
      summary: Generate a Pokemon card artwork image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardImageRequest"
      responses:
        "200":
          description: Image generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardImageResult"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UploadResult:
      type: object
      properties:
        success:
          type: boolean
        filename:
          type: string
        originalName:
          type: string
        size:
          type: number
        message:
          type: string
      required:
        - success
        - filename
        - originalName
        - size
        - message
    PokemonAttack:
      type: object
      properties:
        name:
          type: string
        damage:
          type: number
        description:
          type: string
      required:
        - name
        - damage
        - description
    PokemonCardData:
      type: object
      properties:
        name:
          type: string
        pokemonType:
          type: string
        typeRationale:
          type: string
        hp:
          type: number
        attacks:
          type: array
          items:
            $ref: "#/components/schemas/PokemonAttack"
        pokedexEntry:
          type: string
        yearsOfExperience:
          type: number
      required:
        - name
        - pokemonType
        - typeRationale
        - hp
        - attacks
        - pokedexEntry
        - yearsOfExperience
    CardImageRequest:
      type: object
      properties:
        pokemonType:
          type: string
        name:
          type: string
        pokedexEntry:
          type: string
      required:
        - pokemonType
        - name
        - pokedexEntry
    CardImageResult:
      type: object
      properties:
        imageBase64:
          type: string
        mimeType:
          type: string
      required:
        - imageBase64
        - mimeType
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
