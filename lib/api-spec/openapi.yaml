openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resume
    description: Resume upload operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /resume/upload:
    post:
      operationId: uploadResume
      tags: [resume]
      summary: Upload a resume file
      description: Accepts PDF or Word document and saves it for processing
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UploadResult:
      type: object
      properties:
        success:
          type: boolean
        filename:
          type: string
        originalName:
          type: string
        size:
          type: number
        message:
          type: string
      required:
        - success
        - filename
        - originalName
        - size
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
